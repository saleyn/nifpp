name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test OTP ${{matrix.otp}} / ${{matrix.compiler}} / ${{matrix.os}}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        otp: [27, 28, 29]
        compiler: ['gcc', 'clang']
        exclude:
          # OTP 29 might not be available on all platforms yet
          - os: macos-latest
            otp: 29
          # Windows doesn't have gcc/clang in the same way, use MSYS2
          - os: windows-latest
            compiler: 'clang'
          # Reduce matrix size by testing fewer combinations on Windows
          - os: windows-latest
            otp: 28
          - os: windows-latest
            otp: 29

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Windows - Setup MSYS2
      if: matrix.os == 'windows-latest'
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-make
          make

    - name: Setup Erlang/OTP
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ matrix.otp }}
        install-rebar: false
        install-hex: false

    - name: Verify Erlang include path
      shell: bash
      run: echo "Erlang root: $(erl -noshell -eval 'io:format("~s/usr/include~n", [code:root_dir()]), halt().')"

    - name: Linux - Install build dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential g++ clang

    - name: MacOS - Install build dependencies
      if: matrix.os == 'macos-latest'
      run: |
        # Xcode command line tools should be available
        xcode-select --install 2>/dev/null || true
        # Install additional compilers if needed
        if [ "${{ matrix.compiler }}" = "gcc" ]; then
          brew install gcc
        fi

    - name: Cache build artifacts
      uses: actions/cache@v3
      with:
        path: |
          test/*.o
          test/*.so
          test/*.beam
        key: ${{ runner.os }}-otp-${{ matrix.otp }}-build-${{ hashFiles('**/*.cpp', '**/*.c', '**/*.erl', '**/Makefile') }}
        restore-keys: |
          ${{ runner.os }}-otp-${{ matrix.otp }}-build-

    - name: Verify Erlang installation
      shell: bash
      run: |
        erl -eval 'io:format("Erlang/OTP ~s~n", [erlang:system_info(otp_release)]), halt().' -noshell
        erl -eval 'io:format("ERTS ~s~n", [erlang:system_info(version)]), halt().' -noshell

    - name: Setup compiler environment
      shell: bash
      run: |
        if [ "${{ matrix.os }}" != "windows-latest" ]; then
          if [ "${{ matrix.compiler }}" = "gcc" ]; then
            if [ "${{ matrix.os }}" = "macos-latest" ]; then
              export CXX=g++-13
              export CC=gcc-13
            else
              export CXX=g++
              export CC=gcc
            fi
          else
            export CXX=clang++
            export CC=clang
          fi
          echo "CXX=$CXX" >> $GITHUB_ENV
          echo "CC=$CC" >> $GITHUB_ENV

          # Test compiler
          $CXX --version
          echo "Testing C++20 support..."
          echo '#include <concepts>
          int main() { return 0; }' | $CXX -std=c++20 -x c++ - -o /tmp/test_cpp20 && echo "✓ C++20 supported" || echo "✗ C++20 not supported"
        fi

    - name: Build library (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        echo "Building with ${{ matrix.compiler }}: CC=$CC CXX=$CXX"
        make compile
        # Verify the shared libraries were created
        ls -la test/*.so

    - name: Build library (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        # Add MinGW to PATH
        export PATH="/mingw64/bin:$PATH"

        # Find Erlang installation and headers
        echo "=== Debugging Erlang detection ==="
        echo "Current PATH: $PATH"
        which erl || echo "erl not found in PATH"

        if command -v erl &> /dev/null; then
          echo "✓ Erlang found in PATH"
          erl -eval 'io:format("Erlang/OTP ~s~n", [erlang:system_info(otp_release)]), halt().' -noshell

          # Get Erlang root directory (Windows paths need conversion)
          ERLANG_ROOT_RAW=$(erl -noshell -eval 'io:format("~s~n", [code:root_dir()]), halt().' 2>/dev/null)
          echo "Raw Erlang root: $ERLANG_ROOT_RAW"

          # Convert Windows path to MSYS2 path if needed
          if [[ "$ERLANG_ROOT_RAW" == *":"* ]]; then
            # This looks like a Windows path (C:\...), convert it
            ERLANG_ROOT=$(cygpath -u "$ERLANG_ROOT_RAW" 2>/dev/null || echo "$ERLANG_ROOT_RAW")
            echo "Converted Erlang root: $ERLANG_ROOT"
          else
            ERLANG_ROOT="$ERLANG_ROOT_RAW"
          fi

          # Try multiple possible include paths on Windows
          POTENTIAL_INCLUDES=(
            "${ERLANG_ROOT}/usr/include"
            "${ERLANG_ROOT}/include"
            "${ERLANG_ROOT_RAW}/usr/include"
            "${ERLANG_ROOT_RAW}/include"
          )

          # Also try erts-specific directories
          for erts_dir in "${ERLANG_ROOT}"/erts-*/include "${ERLANG_ROOT_RAW}"/erts-*/include; do
            if [ -d "$erts_dir" ]; then
              POTENTIAL_INCLUDES+=("$erts_dir")
            fi
          done

          echo "Potential include directories:"
          for inc_path in "${POTENTIAL_INCLUDES[@]}"; do
            echo "  - $inc_path"
          done

          ERLANG_INCLUDE=""
          for inc_path in "${POTENTIAL_INCLUDES[@]}"; do
            if [ -d "$inc_path" ] && [ -f "$inc_path/erl_nif.h" ]; then
              ERLANG_INCLUDE="$inc_path"
              echo "✓ Found Erlang headers at: $ERLANG_INCLUDE"
              ls -la "$ERLANG_INCLUDE"/erl_nif.h
              break
            fi
          done

          if [ -z "$ERLANG_INCLUDE" ]; then
            echo "⚠ Could not find erl_nif.h in any of the expected locations"
            echo "Let's search more broadly..."
            # Search in both converted and raw paths
            for search_root in "$ERLANG_ROOT" "$ERLANG_ROOT_RAW"; do
              if [ -n "$search_root" ] && [ -d "$search_root" ]; then
                echo "Searching for erl_nif.h under $search_root..."
                find "$search_root" -name "erl_nif.h" 2>/dev/null | head -5
              fi
            done
          fi

          # Export the include path for make
          export ERLANG_INCLUDE
        else
          echo "⚠ Erlang not found in current PATH - searching manually"
          # Try to find Erlang installation
          for prog_files in "/c/Program Files" "/c/Program Files (x86)"; do
            if [ -d "$prog_files" ]; then
              echo "Searching in $prog_files..."
              find "$prog_files" -name "erl.exe" 2>/dev/null | head -3
              ERLANG_HOME=$(find "$prog_files" -name "erl.exe" 2>/dev/null | head -1 | dirname 2>/dev/null || echo "")
              if [ -n "$ERLANG_HOME" ]; then
                echo "Found Erlang at: $ERLANG_HOME"
                export PATH="$ERLANG_HOME:$PATH"
                break
              fi
            fi
          done
        fi

        echo "Building with MinGW GCC"
        make compile
        # Verify the shared libraries were created (Windows might create .dll instead)
        ls -la test/*.so test/*.dll 2>/dev/null || true

    - name: Run tests (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        make test

    - name: Run tests (Windows)
      if: matrix.os == 'windows-latest'
      shell: msys2 {0}
      run: |
        # Add MinGW to PATH
        export PATH="/mingw64/bin:$PATH"

        # Find and add Erlang path (same as build step)
        if command -v erl &> /dev/null; then
          echo "✓ Erlang found in PATH"
        else
          echo "⚠ Erlang not found in current PATH"
          ERLANG_HOME=$(find /c/Program\ Files -name "erl.exe" 2>/dev/null | head -1 | dirname 2>/dev/null || echo "")
          if [ -n "$ERLANG_HOME" ]; then
            echo "Found Erlang at: $ERLANG_HOME"
            export PATH="$ERLANG_HOME:$PATH"
          fi
        fi

        # Set the same include path as in build step
        ERLANG_ROOT=$(erl -noshell -eval 'io:format("~s~n", [code:root_dir()]), halt().' 2>/dev/null)
        POTENTIAL_INCLUDES=(
          "${ERLANG_ROOT}/usr/include"
          "${ERLANG_ROOT}/include"
          "${ERLANG_ROOT}/erts-"*/include
          "$(dirname "$ERLANG_ROOT")/include"
        )

        ERLANG_INCLUDE=""
        for inc_path in "${POTENTIAL_INCLUDES[@]}"; do
          for expanded_path in $inc_path; do
            if [ -d "$expanded_path" ] && [ -f "$expanded_path/erl_nif.h" ]; then
              ERLANG_INCLUDE="$expanded_path"
              break 2
            fi
          done
        done
        export ERLANG_INCLUDE

        make test

    - name: Check for memory leaks (Linux only)
      if: matrix.os == 'ubuntu-latest' && matrix.otp == '27'
      run: |
        sudo apt-get install -y valgrind
        # Run a basic test under valgrind
        cd test
        valgrind --error-exitcode=1 --leak-check=full --show-leak-kinds=all \
          erl -noshell -noinput -s nifpptest test_basic -eval 'halt(0).' 2>&1 | tee valgrind.log
        # Check for errors (valgrind returns non-zero on errors due to --error-exitcode=1)

  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install clang-tidy and clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-tidy clang-format

    - name: Setup Erlang/OTP (for headers)
      uses: erlef/setup-beam@v1
      with:
        otp-version: '28'
        install-rebar: false
        install-hex: false

    - name: Check code formatting
      run: |
        # Check if C++ code follows formatting standards
        # find . -name "*.cpp" -o -name "*.hpp" -o -name "*.c" -o -name "*.h" | \
        # xargs clang-format --dry-run --Werror --style=file --fallback-style=LLVM
        make check

    # - name: Run clang-tidy
    #   run: |
    #     cd test
    #     # Create compile_commands.json for better analysis
    #     export ERLANG_PATH=$(erl -eval 'io:format("~s", [lists:concat([code:root_dir(), "/erts-", erlang:system_info(version), "/include"])])' -s init stop -noshell)

    #     # Run clang-tidy on main source files
    #     clang-tidy ../enif.hpp --checks=-*,readability-*,performance-*,modernize-*,bugprone-* \
    #       --header-filter=.* -- -I../ -I${ERLANG_PATH} -std=c++20 || true

    #     clang-tidy nifpptest.cpp --checks=-*,readability-*,performance-*,modernize-*,bugprone-* \
    #       -- -I../ -I${ERLANG_PATH} -std=c++20 || true

  release:
    name: Create Release
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        body: |
          nifpp C++ NIF Library Release

          Changes in this release:
          - See commit history for detailed changes

          ## Installation
          Copy `enif.hpp` to your project directory and include it in your NIF implementations.

          ## Requirements
          - C++20 compatible compiler (GCC 10+, Clang 10+)
          - Erlang/OTP 24+
        draft: false
        prerelease: false
