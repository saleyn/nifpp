name: Deploy Documentation

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.md'
  workflow_run:
    workflows: ["CI"]
    branches: [ main, master ]
    types: [ completed ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup Pages
      uses: actions/configure-pages@v6

    - name: Install pandoc
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc

    - name: Build documentation site
      run: |
        mkdir -p _site

        # Create HTML version of REFERENCE.md
        cat > _site/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>NIFPP Documentation</title>
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
            <style>
                .markdown-body {
                    box-sizing: border-box;
                    min-width: 200px;
                    max-width: 980px;
                    margin: 0 auto;
                    padding: 45px;
                }

                @media (max-width: 767px) {
                    .markdown-body {
                        padding: 15px;
                    }
                }

                .header {
                    background-color: #f6f8fa;
                    border-bottom: 1px solid #d1d5da;
                    padding: 20px 0;
                    margin: -45px -45px 30px -45px;
                    text-align: center;
                }

                .header h1 {
                    margin: 0;
                    color: #24292e;
                }

                .header p {
                    margin: 10px 0 0 0;
                    color: #586069;
                }

                .footer {
                    margin-top: 40px;
                    padding-top: 20px;
                    border-top: 1px solid #eaecef;
                    text-align: center;
                    color: #586069;
                    font-size: 0.9em;
                }

                .nav-links {
                    text-align: center;
                    margin: 20px 0;
                }

                .nav-links a {
                    margin: 0 10px;
                    padding: 8px 16px;
                    background-color: #f6f8fa;
                    border: 1px solid #d1d5da;
                    border-radius: 6px;
                    text-decoration: none;
                    color: #24292e;
                }

                .nav-links a:hover {
                    background-color: #e1e4e8;
                    text-decoration: none;
                }

                /* Improve code block styling */
                .markdown-body pre {
                    background-color: #f6f8fa;
                }

                .markdown-body code {
                    background-color: rgba(175, 184, 193, 0.2);
                }
            </style>
        </head>
        <body>
            <div class="header">
                <h1>NIFPP Documentation</h1>
                <p>C++ wrapper for the Erlang NIF API</p>
            </div>

            <div class="nav-links">
                <a href="#table-of-contents">Table of Contents</a>
                <a href="./REFERENCE.md">Raw Markdown</a>
                <a href="https://github.com/saleyn/nifpp">GitHub Repository</a>
            </div>

            <div class="markdown-body">
        EOF

        # Convert REFERENCE.md to HTML using pandoc
        pandoc REFERENCE.md \
          --from markdown \
          --to html \
          --wrap=preserve \
          >> _site/index.html

        # Close HTML tags
        cat >> _site/index.html << 'EOF'
            </div>

            <div class="footer">
                <p>Generated from <a href="https://github.com/saleyn/nifpp">nifpp</a> REFERENCE.md</p>
                <p>Last updated: <span id="build-date"></span></p>
                <p><a href="https://github.com/saleyn/nifpp/issues">Report issues</a> | <a href="https://github.com/saleyn/nifpp/blob/main/REFERENCE.md">Edit this page</a></p>
            </div>

            <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
            <script>hljs.highlightAll();</script>
            <script>
                // Set current date
                document.getElementById('build-date').textContent = new Date().toUTCString();

                // Add smooth scrolling to anchor links
                document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                    anchor.addEventListener('click', function (e) {
                        e.preventDefault();
                        const target = document.querySelector(this.getAttribute('href'));
                        if (target) {
                            target.scrollIntoView({
                                behavior: 'smooth'
                            });
                        }
                    });
                });
            </script>
        </body>
        </html>
        EOF

        # Also provide the raw markdown file
        cp REFERENCE.md _site/REFERENCE.md

        # Create a simple 404 page
        cat > _site/404.html << 'EOF'
        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Page Not Found - NIFPP Documentation</title>
            <style>
                body {
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
                    line-height: 1.6;
                    color: #24292e;
                    max-width: 600px;
                    margin: 100px auto;
                    padding: 20px;
                    text-align: center;
                }
                h1 { color: #d73a49; }
                a { color: #0366d6; text-decoration: none; }
                a:hover { text-decoration: underline; }
            </style>
        </head>
        <body>
            <h1>404 - Page Not Found</h1>
            <p>The page you're looking for doesn't exist.</p>
            <p><a href="/">← Back to NIFPP Documentation</a></p>
        </body>
        </html>
        EOF

        # Add a sitemap for better SEO
        cat > _site/sitemap.txt << 'EOF'
        https://saleyn.github.io/nifpp/
        https://saleyn.github.io/nifpp/REFERENCE.md
        EOF

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: '_site'

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs

    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
